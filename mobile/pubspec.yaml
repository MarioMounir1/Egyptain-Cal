name: egyptian_cal
description: "AI-powered food nutrition tracker for the Egyptian market."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.1

  # Local storage
  shared_preferences: ^2.3.3

  # Image picker (camera + gallery)
  image_picker: ^1.1.2

  # Charts for macro rings
  fl_chart: ^0.70.0

  # Google Fonts (Cairo for Arabic, Poppins for Latin)
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
